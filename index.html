<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Programım</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcf0;
            --primary: #bde0fe;
            --secondary: #ffafcc;
            --accent: #cdb4db;
            --today-highlight: #d4edda; 
            --today-border: #71d08c;
            --text: #444;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* Canlı Tarih Bölümü */
        .live-date-header {
            text-align: center;
            background: #fff9f9;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ffeef0;
            margin-bottom: 20px;
        }

        #currentDayDisplay {
            display: block;
            font-size: 1.4rem;
            font-weight: 600;
            color: #888;
        }

        #fullDateDisplay {
            font-size: 0.9rem;
            color: #aaa;
        }

        h1 { text-align: center; color: #555; margin: 10px 0 20px 0; font-size: 1.6rem; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
        }

        .add-btn {
            background: var(--primary);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover { background: #a2d2ff; }

        .study-item {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: #fff;
            border-radius: 15px;
            border: 2px solid #f0f0f0;
            transition: 0.3s;
        }

        .is-today {
            background-color: var(--today-highlight) !important;
            border-color: var(--today-border) !important;
            box-shadow: 0 4px 12px rgba(113, 208, 140, 0.2);
        }

        .item-info b { font-size: 1.1rem; }
        .item-actions { display: flex; gap: 10px; align-items: center; }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .done-btn { background: #eee; }
        .done-btn.active { background: #2ecc71; color: white; }

        .help-btn { background: #eee; }
        .help-btn.active { background: #f1c40f; color: white; }

        .del-btn { background: #ff7675; color: white; font-size: 0.8rem; border-radius: 8px; padding: 5px 10px; border:none; cursor:pointer;}

        .status-tag { font-size: 0.75rem; font-weight: 600; margin-top: 5px; display: inline-block; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="live-date-header">
        <span id="currentDayDisplay">Yükleniyor...</span>
        <span id="fullDateDisplay">Yükleniyor...</span>
    </div>

    <h1>🗓️ Günlük Ders Programım </h1>

    <div class="form-grid">
        <input type="date" id="dateInput">
        <select id="subjectInput">
            <option value="Matematik">Matematik</option>
            <option value="Edebiyat">Edebiyat</option>
            <option value="Fizik">Fizik</option>
            <option value="Kimya">Kimya</option>
            <option value="Biyoloji">Biyoloji</option>
            <option value="Din">Din</option>
            <option value="Tarih">Tarih</option>
        </select>
        <input type="text" id="topicInput" placeholder="Konu Başlığı">
        <input type="number" id="questionInput" placeholder="Soru Hedefi">
        <button class="add-btn" onclick="saveTask()">Plana Ekle</button>
    </div>

    <div id="displayArea"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        updateClock();
        renderTasks();
        setInterval(updateClock, 1000 * 60); // Dakikada bir saati güncelle
    });

    function updateClock() {
        const now = new Date();
        const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
        const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
        
        document.getElementById('currentDayDisplay').innerText = days[now.getDay()];
        document.getElementById('fullDateDisplay').innerText = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    }

    function saveTask() {
        const dateVal = document.getElementById('dateInput').value;
        const subjectVal = document.getElementById('subjectInput').value;
        const topicVal = document.getElementById('topicInput').value;
        const quesVal = document.getElementById('questionInput').value;

        if(!dateVal || !topicVal) {
            alert("Lütfen tarih ve konu kısımlarını doldur.");
            return;
        }

        const newTask = {
            id: Date.now(),
            date: dateVal,
            subject: subjectVal,
            topic: topicVal,
            questions: quesVal || 0,
            isDone: false,
            needsHelp: false
        };

        let tasks = JSON.parse(localStorage.getItem('studyTasks')) || [];
        tasks.push(newTask);
        localStorage.setItem('studyTasks', JSON.stringify(tasks));
        
        renderTasks();
        document.getElementById('topicInput').value = '';
        document.getElementById('questionInput').value = '';
    }

    function renderTasks() {
        const area = document.getElementById('displayArea');
        const tasks = JSON.parse(localStorage.getItem('studyTasks')) || [];
        
        const now = new Date();
        const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

        tasks.sort((a, b) => new Date(a.date) - new Date(b.date));
        area.innerHTML = '';
        
        if(tasks.length === 0) {
            area.innerHTML = '<p style="text-align:center; color:#999;">Henüz plan eklenmemiş.</p>';
            return;
        }

        tasks.forEach(t => {
            const isToday = t.date === today ? 'is-today' : '';
            area.innerHTML += `
                <div class="study-item ${isToday}">
                    <div class="item-info">
                        <small style="color:#888">${t.date === today ? '<b>🌟 BUGÜN: </b>' : ''}${t.date}</small><br>
                        <b>${t.subject}</b> - ${t.topic} 
                        <span style="color:#666; font-size: 0.9rem; margin-left:5px;">(📝 ${t.questions} Soru)</span><br>
                        ${t.needsHelp ? '<span class="status-tag" style="background:#fff3cd; color:#856404">⚠️ Hocaya Sor</span>' : ''}
                        ${t.isDone ? '<span class="status-tag" style="background:#d4edda; color:#155724">✅ Tamamlandı</span>' : ''}
                    </div>
                    <div class="item-actions">
                        <button class="action-btn done-btn ${t.isDone ? 'active' : ''}" onclick="toggleStatus(${t.id}, 'done')">✓</button>
                        <button class="action-btn help-btn ${t.needsHelp ? 'active' : ''}" onclick="toggleStatus(${t.id}, 'help')">!</button>
                        <button class="del-btn" onclick="deleteTask(${t.id})">Sil</button>
                    </div>
                </div>
            `;
        });
    }

    function toggleStatus(id, type) {
        let tasks = JSON.parse(localStorage.getItem('studyTasks'));
        const index = tasks.findIndex(t => t.id === id);
        if(type === 'done') tasks[index].isDone = !tasks[index].isDone;
        if(type === 'help') tasks[index].needsHelp = !tasks[index].needsHelp;
        localStorage.setItem('studyTasks', JSON.stringify(tasks));
        renderTasks();
    }

    function deleteTask(id) {
        if(confirm("Bu görevi silmek istediğine emin misin?")) {
            let tasks = JSON.parse(localStorage.getItem('studyTasks'));
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('studyTasks', JSON.stringify(tasks));
            renderTasks();
        }
    }
</script>

</body>
</html>
